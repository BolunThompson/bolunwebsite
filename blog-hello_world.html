<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
a.link-button, a.link-button:hover, a.link-button:focus {
    text-decoration: none;
    color: inherit;
}
.page {
    display: flex;
    flex-wrap: wrap;
}
p { font-size: 18px; }
ul {
    position: relative;
    list-style: none;
    margin-left: 0;
    padding-left: 1.2em;
}
ul li {
    padding: 5px 0px;
}
ul li:before {
    content: "▣";
    position: absolute;
    left: 0;
}

.box {
    font-family: 'Times New Roman', serif;
    background-color: #c0c0c0;
    border-style: outset;
    border-color: white black black white;
    padding-right: 1px;
    margin: 10px;
}
.file {
    flex: 1;
}
.scrollbox::-webkit-scrollbar {
    background-color: #e0e3e4;
    width: 22px;
}
.scrollbox::-webkit-scrollbar-thumb {
    background-color: #c0c0c0ff;
    border-style: outset;
    border-color: white black black white;
}
.scrollbox::-webkit-scrollbar-button:single-button:vertical:decrement {
    background-image: url('images/uparrow.png');
    background-size: 8px;
    background-position: center center;
    background-repeat: no-repeat;
    background-color: #c0c0c0ff;
    border-style: outset;
    border-color: white black black white;
}
.scrollbox::-webkit-scrollbar-button:single-button:vertical:decrement:active {
    border-style: solid;
    border-color: #9b9ea3;
}
.scrollbox::-webkit-scrollbar-button:single-button:vertical:increment {
    background-image: url('images/downarrow.png');
    background-size: 8px;
    background-position: center center;
    background-repeat: no-repeat;
    background-color: #c0c0c0ff;
    border-style: outset;
    border-color: white black black white;
}
.scrollbox::-webkit-scrollbar-button:single-button:vertical:increment:active {
    border-style: solid;
    border-color: #9b9ea3;
}
.welcome {

.bar {

.box-content {

.flex-content {

.filebox {

.blogbox {

.picture {

.picture-headshot {

    height: 0;

}
.picture-headshot:hover {
    background-image: url("images/headshot2.jpg");

}
.buttons {
    display: flex;
    flex-direction: column;
    gap: 7px;
}
.button {
    font-family: 'Calibri', sans-serif;
    color: black;
    background-color: #c0c0c0ff;
    border-style: outset;
    border-color: white black black white;
    padding: 1px;
    text-align: center;
    position: relative;
}
.button:active {
    border-style: inset;
    border-color: black white white black;
}
.select:active {
    border-style: solid;
    border-color: black;
}
.selected {
    border-color: black;
}
.select-inner {
    border-style: none;
    border-radius: 2.5px;
    position: absolute;
    top: 2.5px;
    bottom: 2.5px;
    left: 2.5px;
    right: 2.5px;
}
.select:active > .select-inner {
    border-style: dotted;
}
.selected-inner {
    border-style: dotted;
    border-radius: 2.5px;
    position: absolute;
    top: 2.5px;
    bottom: 2.5px;
    left: 2.5px;
    right: 2.5px;
}
.socials {
    display: flex;
    justify-content: center;
    gap: 20px;
}
.icons {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    font-family: 'Calibri', sans-serif;
    color: black;
}
.icon {
    text-align: center;
}
.icon-img {
    width: 80px;
    image-rendering: pixelated;
}
.icon-img-hidden {
    position: fixed;
    width: 80px;
    margin-left: -80px;
    image-rendering: pixelated;
    opacity: 0;
}
.icon:active > .icon-img-hidden {
    opacity: 1;
}
.icon:active > .icon-txt {
    background-color: #0000a8;
    color: white;
    outline: dotted black;
}
.box-footer {
    display: flex;
    font-family: 'Calibri', sans-serif;
    background-color: #c0c0c0;
    padding: 1px;
    margin: 2px;
}
.box-toe {
    display: flex;
    flex-grow: 1;
    border-style: inset;
    border-color: white;
}

.footer {
    position: fixed;
    z-index: 100;
    font-family: 'Calibri', sans-serif;
    background-color: #c0c0c0;
    border-style: outset outset none none;
    border-color: white black black white;
    bottom: 0px;
    width: 100%;
    display: flex;
}
.footer-button {
    font-family: 'Calibri', sans-serif;
    background-color: #dee2e3;
    border-style: inset;
    border-color: black white white black;
    padding: 1px;
    margin: 2px;
}
.footer-bg {
    background-color: #c0c0c0;
    border-style: outset;
    border-color: white black black white;
}
.footer-time {
    font-family: 'Calibri', sans-serif;
    background-color: #c0c0c0;
    border-style: inset;
    border-color: #eeeeee;
    padding: 1px;
    margin: 2px;
    text-align: center;
}

.mini-icon {
    image-rendering: pixelated;
    object-fit: contain;
    margin-left: 2px;
    margin-right: 2px;
}

.window-box {
    position: absolute;
    z-index: 50;
}
</style>
